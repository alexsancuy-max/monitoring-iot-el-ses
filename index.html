<script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwjwr7qXbc9D5D6C99gNKzyzqxvlXpE7JH_V9PeH4JUR57F2Y6cEWcGaypX7LMXn3KI/exec";

        async function fetchData() {
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                // Karena Apps Script sekarang hanya kirim 1 data terbaru, ambil indeks 0
                const lastRow = data[0];

                // Update angka dan gunakan .toFixed(2) supaya desimalnya rapi (maks 2 angka)
                document.getElementById('vLM').innerText = Number(lastRow.tempLM).toFixed(2);
                document.getElementById('vDHT').innerText = Number(lastRow.tempDHT).toFixed(2);
                document.getElementById('vHUM').innerText = Number(lastRow.humDHT).toFixed(2);
                
                // Menampilkan status waktu terakhir
                // Jika format tanggal dari Google aneh, kita bersihkan sedikit
                let tgl = new Date(lastRow.Tanggal).toLocaleDateString('id-ID');
                document.getElementById('info').innerText = "Data terakhir dari: " + tgl + " | " + lastRow.Waktu;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('info').innerText = "Gagal memuat data. Periksa URL!";
            }
        }

        setInterval(fetchData, 5000);
        fetchData();
    </script>
